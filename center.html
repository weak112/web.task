<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 影跃律动</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common/reset.css">
  <link rel="stylesheet" href="css/common/common.css">
  <link rel="stylesheet" href="css/common/responsive.css">
  <link rel="stylesheet" href="css/page/center.css">
  <link rel="stylesheet" href="css/page/index.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="index.html" class="logo">
          <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=40&h=40&fit=crop&crop=center" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
          影跃律动
        </a>
        <div class="nav-links" id="navLinks">
        </div>

        <div class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <main class="container" style="padding-top: 40px;">
    <div class="profile-header" style="background: var(--bg-light); padding: 40px; border-radius: 20px; margin-bottom: 40px; display: flex; gap: 32px; align-items: center;">
      <img class="profile-avatar" id="profileAvatar" style="width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--secondary-color);">
      <div class="profile-info" style="flex: 1;">
        <h1 class="profile-name" id="profileName" style="font-size: 32px; font-weight: 700; margin-bottom: 8px;"></h1>
        <p class="profile-email" id="profileEmail" style="color: var(--text-muted); margin-bottom: 16px;"></p>
        <div class="profile-stats" style="display: flex; gap: 40px;">
          <div class="stat-item" style="text-align: center;">
            <div class="stat-value" id="statFavorites" style="font-size: 28px; font-weight: 700; color: var(--secondary-color);">0</div>
            <div class="stat-label" style="font-size: 14px; color: var(--text-muted);">收藏</div>
          </div>
        </div>
      </div>
    </div>

    <div class="center-tabs" style="display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 2px solid var(--border-color);">
      <button class="center-tab active" data-tab="favorites" style="padding: 16px 28px; background: transparent; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative;">我的收藏</button>
      <button class="center-tab" data-tab="settings" style="padding: 16px 28px; background: transparent; border: none; color: var(--text-muted); font-weight: 600; cursor: pointer; transition: all 0.3s ease; position: relative;">账号设置</button>
    </div>

    <div id="tab-favorites" class="tab-content active">
      <div class="favorites-grid" id="favoritesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px;"></div>
    </div>

    <div id="tab-settings" class="tab-content" style="display: none;">
      <div class="settings-section" style="background: var(--bg-light); padding: 32px; border-radius: 16px; margin-bottom: 24px;">
        <h3 class="settings-title" style="font-size: 20px; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);">基本信息</h3>
        <form id="settingsForm">
          <div class="form-group" style="max-width: 500px;">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" id="settingsUsername" required>
          </div>
          <div class="form-group" style="max-width: 500px;">
            <label class="form-label">邮箱</label>
            <input type="email" class="form-input" id="settingsEmail" disabled style="background: var(--bg-dark); opacity: 0.7;">
          </div>
          <button type="submit" class="btn btn-primary">保存修改</button>
        </form>
      </div>

      <div class="settings-section" style="background: var(--bg-light); padding: 32px; border-radius: 16px; margin-bottom: 24px;">
        <h3 class="settings-title" style="font-size: 20px; font-weight: 700; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);">修改密码</h3>
        <form id="passwordForm">
          <div class="form-group" style="max-width: 500px;">
            <label class="form-label">原密码</label>
            <input type="password" class="form-input" id="oldPassword" required>
          </div>
          <div class="form-group" style="max-width: 500px;">
            <label class="form-label">新密码</label>
            <input type="password" class="form-input" id="newPassword" required>
          </div>
          <div class="form-group" style="max-width: 500px;">
            <label class="form-label">确认新密码</label>
            <input type="password" class="form-input" id="confirmNewPassword" required>
          </div>
          <button type="submit" class="btn btn-primary">修改密码</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div>
          <h3 style="color: var(--secondary-color); margin-bottom: 10px;">影跃律动</h3>
          <p class="text-muted">发现精彩，分享感动</p>
        </div>
        <div class="text-muted">
          © 2024 影跃律动. All rights reserved.
        </div>
      </div>
    </div>
  </footer>

  <script src="js/common/utils.js"></script>
  <script src="js/common/storage.js"></script>
  <script src="js/common/validate.js"></script>
  <script src="js/data/mock-data.js"></script>
  <script src="js/page/center.js"></script>
</body>
</html>
