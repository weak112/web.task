<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 影跃律动</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common/reset.css">
  <link rel="stylesheet" href="css/common/common.css">
  <link rel="stylesheet" href="css/common/responsive.css">
  <link rel="stylesheet" href="css/page/auth.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="index.html" class="logo">
          <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=40&h=40&fit=crop&crop=center" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
          影跃律动
        </a>
        <div class="nav-links" id="navLinks">
          <a href="index.html" class="nav-link">首页</a>
          <a href="list.html" class="nav-link">发现</a>
          <a href="register.html" class="nav-link">注册</a>
        </div>

        <div class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">欢迎回来</h1>
        <p class="auth-subtitle">登录以继续探索精彩内容</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" id="email" placeholder="请输入邮箱" required>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
      </form>

      <div class="auth-footer">
        <p>还没有账号？
          <a href="register.html" class="auth-link">立即注册</a>
        </p>
      </div>
    </div>
  </main>

  <script src="js/common/utils.js"></script>
  <script src="js/common/storage.js"></script>
  <script src="js/common/validate.js"></script>
  <script src="js/data/mock-data.js"></script>
  <script src="js/page/login.js"></script>
</body>
</html>
