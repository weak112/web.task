<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 影跃律动</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common/reset.css">
  <link rel="stylesheet" href="../css/common/common.css">
  <link rel="stylesheet" href="../css/common/responsive.css">
  <link rel="stylesheet" href="../css/page/admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="../index.html" class="logo">
          <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=40&h=40&fit=crop&crop=center" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
          影跃律动
        </a>
        <div class="nav-links" id="navLinks">
          <a href="../index.html" class="nav-link">返回首页</a>
          <a href="#" class="nav-link" onclick="logout()">退出</a>
        </div>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
          <span class="theme-icon">🌙</span>
        </button>
        <div class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="admin-layout" style="display: flex; min-height: calc(100vh - 140px);">
    <aside class="admin-sidebar" style="width: 260px; background: var(--bg-light); padding: 24px; border-right: 1px solid var(--border-color);">
      <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 8px;">
        <a href="index.html" class="admin-nav-item active" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: white; background: var(--secondary-color); font-weight: 500;">
          📊 仪表盘
        </a>
        <a href="goods-manage.html" class="admin-nav-item" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); font-weight: 500; transition: all 0.3s ease;">
          🎬 内容管理
        </a>
        <a href="user-manage.html" class="admin-nav-item" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); font-weight: 500; transition: all 0.3s ease;">
          👥 用户管理
        </a>
      </nav>
    </aside>

    <main class="admin-main" style="flex: 1; padding: 32px;">
      <div class="admin-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <h1 class="admin-page-title" style="font-size: 28px; font-weight: 700;">管理仪表盘</h1>
      </div>

      <div class="stats-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px;">
        <div class="stat-card" style="background: var(--bg-light); padding: 28px; border-radius: 16px; border: 1px solid var(--border-color);">
          <div class="stat-icon primary" style="width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; background: rgba(59, 130, 246, 0.15);">🎬</div>
          <div class="stat-number" id="statMovies" style="font-size: 32px; font-weight: 700; margin-bottom: 6px;">0</div>
          <div class="stat-label" style="color: var(--text-muted); font-size: 14px;">电影总数</div>
        </div>
        <div class="stat-card" style="background: var(--bg-light); padding: 28px; border-radius: 16px; border: 1px solid var(--border-color);">
          <div class="stat-icon secondary" style="width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; background: rgba(245, 158, 11, 0.15);">🎵</div>
          <div class="stat-number" id="statMusic" style="font-size: 32px; font-weight: 700; margin-bottom: 6px;">0</div>
          <div class="stat-label" style="color: var(--text-muted); font-size: 14px;">音乐总数</div>
        </div>
        <div class="stat-card" style="background: var(--bg-light); padding: 28px; border-radius: 16px; border: 1px solid var(--border-color);">
          <div class="stat-icon success" style="width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; background: rgba(16, 185, 129, 0.15);">👥</div>
          <div class="stat-number" id="statUsers" style="font-size: 32px; font-weight: 700; margin-bottom: 6px;">0</div>
          <div class="stat-label" style="color: var(--text-muted); font-size: 14px;">用户总数</div>
        </div>
        <div class="stat-card" style="background: var(--bg-light); padding: 28px; border-radius: 16px; border: 1px solid var(--border-color);">
          <div class="stat-icon warning" style="width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 16px; background: rgba(245, 158, 11, 0.15);">👁️</div>
          <div class="stat-number" id="statViews" style="font-size: 32px; font-weight: 700; margin-bottom: 6px;">0</div>
          <div class="stat-label" style="color: var(--text-muted); font-size: 14px;">总浏览量</div>
        </div>
      </div>

      <div style="background: var(--bg-light); padding: 32px; border-radius: 16px; border: 1px solid var(--border-color);">
        <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 24px;">欢迎使用管理后台</h2>
        <p style="color: var(--text-muted); line-height: 1.8;">
          在这里你可以管理网站的所有内容和用户。<br>
          - 左侧菜单可以切换不同的管理功能<br>
          - 内容管理：可以查看和删除电影和音乐内容<br>
          - 用户管理：可以查看和管理注册用户
        </p>
      </div>
    </main>
  </div>

  <script src="../js/common/utils.js"></script>
  <script src="../js/common/storage.js"></script>
  <script src="../js/common/validate.js"></script>
  <script src="../js/data/mock-data.js"></script>
  <script src="../js/page/admin.js"></script>
  <script>
    function logout() {
      clearCurrentUser();
      showToast('已退出登录', 'success');
      setTimeout(() => window.location.href = '../index.html', 500);
    }
  </script>
</body>
</html>
