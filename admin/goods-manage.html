<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容管理 - 影跃律动</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+SC:wght=400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common/reset.css">
  <link rel="stylesheet" href="../css/common/common.css">
  <link rel="stylesheet" href="../css/common/responsive.css">
  <link rel="stylesheet" href="../css/page/admin.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="../index.html" class="logo">
          <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=40&h=40&fit=crop&crop=center" alt="Logo" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
          影跃律动
        </a>
        <div class="nav-links" id="navLinks">
          <a href="../index.html" class="nav-link">返回首页</a>
          <a href="#" class="nav-link" onclick="logout()">退出</a>
        </div>
        <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()">
          <span class="theme-icon">🌙</span>
        </button>
        <div class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </nav>

  <div class="admin-layout" style="display: flex; min-height: calc(100vh - 140px);">
    <aside class="admin-sidebar" style="width: 260px; background: var(--bg-light); padding: 24px; border-right: 1px solid var(--border-color);">
      <nav class="admin-nav" style="display: flex; flex-direction: column; gap: 8px;">
        <a href="index.html" class="admin-nav-item" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); font-weight: 500; transition: all 0.3s ease;">
          📊 仪表盘
        </a>
        <a href="goods-manage.html" class="admin-nav-item active" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: white; background: var(--secondary-color); font-weight: 500;">
          🎬 内容管理
        </a>
        <a href="user-manage.html" class="admin-nav-item" style="display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-radius: 10px; color: var(--text-muted); font-weight: 500; transition: all 0.3s ease;">
          👥 用户管理
        </a>
      </nav>
    </aside>

    <main class="admin-main" style="flex: 1; padding: 32px;">
      <div class="admin-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <h1 class="admin-page-title" style="font-size: 28px; font-weight: 700;">内容管理</h1>
      </div>

      <div class="data-table-container" style="background: var(--bg-light); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color);">
        <table class="data-table" style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">封面</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">标题</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">类型</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">分类</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">评分</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">年份</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">浏览量</th>
              <th style="background: var(--bg-dark); padding: 16px; text-align: left; font-weight: 600; color: var(--text-light); border-bottom: 1px solid var(--border-color);">操作</th>
            </tr>
          </thead>
          <tbody id="goodsTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/common/utils.js"></script>
  <script src="../js/common/storage.js"></script>
  <script src="../js/common/validate.js"></script>
  <script src="../js/data/mock-data.js"></script>
  <script src="../js/page/admin-goods.js"></script>
  <script>
    function logout() {
      clearCurrentUser();
      showToast('已退出登录', 'success');
      setTimeout(() => window.location.href = '../index.html', 500);
    }
  </script>
</body>
</html>
